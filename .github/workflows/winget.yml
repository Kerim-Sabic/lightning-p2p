name: Publish to winget

# Fires after a GitHub release is published. The first manifest
# submission to microsoft/winget-pkgs must be done manually; after
# that, this workflow opens an auto-PR on each subsequent release.
#
# Required secret: WINGET_TOKEN
#   A classic Personal Access Token with `public_repo` scope on a
#   fork of microsoft/winget-pkgs. Set it in repo settings.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (e.g. v0.4.0)
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Require Winget token
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINGET_TOKEN)) {
            throw "WINGET_TOKEN is required. Add a classic PAT with public_repo scope on your microsoft/winget-pkgs fork."
          }

      - name: Submit to microsoft/winget-pkgs
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: LightningP2P.LightningP2P
          installers-regex: '_x64-setup\.exe$'
          release-tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
          token: ${{ secrets.WINGET_TOKEN }}
