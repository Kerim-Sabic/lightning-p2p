name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        working-directory: src-tauri
        run: cargo test

  frontend:
    name: Frontend (lint + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  windows-package:
    name: Windows package smoke
    runs-on: windows-latest
    needs: [rust, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows bundles
        run: pnpm build:windows

      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: lightning-p2p-windows-smoke-bundle
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

  release-windows:
    name: Release Windows
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    needs: [windows-package]
    permissions:
      contents: write
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        shell: pwsh
        run: |
          $config = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          "APP_VERSION=$($config.version)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RELEASE_TAG=v$($config.version)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Require updater signing key
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "TAURI_SIGNING_PRIVATE_KEY is required for release builds so updater artifacts can be generated."
          }

          Write-Host "Signing key detected. Release config will enable updater artifacts."

      - name: Build and create GitHub release
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: Lightning P2P v${{ env.APP_VERSION }}
          releaseBody: |
            ## Lightning P2P v${{ env.APP_VERSION }}

            Direct peer-to-peer file transfer. No cloud. No accounts. No limits. Works across LAN and the public internet through iroh relay fallback.

            ### Downloads

            | File | Description |
            |------|-------------|
            | `Lightning.P2P_${{ env.APP_VERSION }}_x64-setup.exe` | Windows NSIS installer (recommended) |
            | `Lightning.P2P_${{ env.APP_VERSION }}_x64_en-US.msi` | Windows MSI installer |

            SHA256 checksums are published alongside the installers.

            ### What's included

            - End-to-end encrypted transfers via QUIC TLS 1.3
            - BLAKE3 verified streaming with iroh-blobs
            - WAN reachability with direct and relay-assisted connectivity
            - Live progress tracking with speed and ETA
            - QR code ticket sharing
            - Transfer history with one-click re-share
            - Signed auto-update support

            ### Installation

            1. Download the `.exe` installer above
            2. Run the installer (you may need to click "More info" > "Run anyway" on SmartScreen)
            3. Launch Lightning P2P from the Start Menu

            ---

            Full changelog: https://github.com/Kerim-Sabic/lightning-p2p/commits/${{ env.RELEASE_TAG }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --ci --target x86_64-pc-windows-msvc --config src-tauri/tauri.release.conf.json

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $bundleRoot = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          $files = Get-ChildItem -Path $bundleRoot -Recurse -File |
            Where-Object {
              $_.Extension -in ".exe", ".msi", ".sig" -or
              $_.Extension -eq ".zip" -or
              $_.Name -like "latest*.json"
            } |
            Sort-Object Name

          if (-not $files) {
            throw "No release files found for checksum generation."
          }

          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -Path $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            $assetName = $file.Name -replace " ", "."
            "$hash  $assetName"
          }

          $checksumPath = Join-Path $bundleRoot "SHA256SUMS.txt"
          $lines | Set-Content -Path $checksumPath -Encoding utf8
          Write-Host "Checksums written to $checksumPath"

      - name: Upload release checksums
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/SHA256SUMS.txt

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: lightning-p2p-windows-release-bundle
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.zip
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.zip
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.sig
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/SHA256SUMS.txt
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.zip
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.sig
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/latest*.json
