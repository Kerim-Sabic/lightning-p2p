name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_mode:
        description: Windows release mode for manual runs
        required: true
        default: auto
        type: choice
        options:
          - auto
          - community_unsigned
          - production_signed

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        working-directory: src-tauri
        run: cargo test

  frontend:
    name: Frontend (lint + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: node scripts/check-release-state.mjs

  web-receiver:
    name: Web receiver (WASM engine build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang (ring's wasm C toolchain)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: web-receiver

      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.126

      - name: Test engine (ticket + collection logic, native)
        working-directory: web-receiver
        run: cargo test

      - name: Build engine to wasm32
        working-directory: web-receiver
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Generate wasm-bindgen glue
        working-directory: web-receiver
        run: wasm-bindgen --target web --out-dir out --no-typescript target/wasm32-unknown-unknown/release/web_receiver.wasm

      - name: Verify the wasm exports the receiver engine surface
        working-directory: web-receiver
        run: |
          node -e '
            const fs = require("fs");
            const buf = fs.readFileSync("out/web_receiver_bg.wasm");
            WebAssembly.compile(buf).then((mod) => {
              const have = new Set(WebAssembly.Module.exports(mod).map((e) => e.name));
              const want = ["webreceiver_fetch","webreceiver_list_collection","webreceiver_read_blob","webreceiver_spawn","inspect_ticket"];
              const missing = want.filter((w) => !have.has(w));
              if (missing.length) { console.error("missing wasm exports:", missing.join(", ")); process.exit(1); }
              console.log("web-receiver wasm OK; engine exports present");
            }).catch((e) => { console.error("wasm invalid:", e.message); process.exit(1); });
          '

      - name: Confirm committed public/webrx artifact exists
        run: |
          test -s public/webrx/web_receiver.js || (echo "public/webrx/web_receiver.js missing — run scripts/build-web-receiver.sh" && exit 1)
          test -s public/webrx/web_receiver_bg.wasm || (echo "public/webrx/web_receiver_bg.wasm missing — run scripts/build-web-receiver.sh" && exit 1)

  benchmark-local-smoke:
    name: Benchmark (same-machine harness smoke)
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build benchmark-local
        working-directory: src-tauri
        run: cargo build --release --features benchmark-bin --bin benchmark-local

      - name: Run smoke benchmark (10 MB, 3 runs)
        run: bash scripts/run-local-benchmark.sh --profile smoke --runs 3

      - name: Verify benchmark report wrote summary
        run: |
          test -s docs/reports/raw/local/latest.json || (echo "latest.json missing or empty" && exit 1)
          test -s docs/reports/raw/local/latest.csv || (echo "latest.csv missing or empty" && exit 1)
          echo "--- summary ---"
          # Print summary using node so this stays jq-free
          node -e "const r=require('./docs/reports/raw/local/latest.json'); for (const s of r.summary) { console.log(\`  \${s.scenario}: runs=\${s.runs} ok=\${s.successes} fail=\${s.failures} median_mbps=\${s.median_effective_mbps}\`); }"

      - name: Upload local benchmark evidence
        uses: actions/upload-artifact@v4
        with:
          name: lightning-p2p-local-benchmark
          path: |
            docs/reports/raw/local/*.json
            docs/reports/raw/local/*.csv

  release-plan:
    name: Resolve release mode
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      windows_release_mode: ${{ steps.plan.outputs.windows_release_mode }}
      android_release_mode: ${{ steps.plan.outputs.android_release_mode }}
    steps:
      - name: Choose release mode
        id: plan
        env:
          REQUESTED_RELEASE_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.release_mode || 'auto' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          has_windows_signing=false
          if [ -n "${TAURI_SIGNING_PRIVATE_KEY}" ] &&
             [ -n "${AZURE_CLIENT_ID}" ] &&
             [ -n "${AZURE_CLIENT_SECRET}" ] &&
             [ -n "${AZURE_TENANT_ID}" ] &&
             [ -n "${AZURE_TRUSTED_SIGNING_ENDPOINT}" ] &&
             [ -n "${AZURE_TRUSTED_SIGNING_ACCOUNT}" ] &&
             [ -n "${AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE}" ]; then
            has_windows_signing=true
          fi

          case "${REQUESTED_RELEASE_MODE}" in
            production_signed)
              windows_release_mode="production_signed"
              ;;
            community_unsigned)
              windows_release_mode="community_unsigned"
              ;;
            auto|*)
              if [ "${has_windows_signing}" = "true" ]; then
                windows_release_mode="production_signed"
              else
                windows_release_mode="community_unsigned"
              fi
              ;;
          esac

          android_release_mode="skip"
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ] &&
             [ -n "${ANDROID_KEYSTORE_PASSWORD}" ] &&
             [ -n "${ANDROID_KEY_ALIAS}" ] &&
             [ -n "${ANDROID_KEY_PASSWORD}" ]; then
            android_release_mode="signed"
          fi

          {
            echo "windows_release_mode=${windows_release_mode}"
            echo "android_release_mode=${android_release_mode}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Release plan"
            echo ""
            echo "- Requested mode: \`${REQUESTED_RELEASE_MODE}\`"
            echo "- Windows release mode: \`${windows_release_mode}\`"
            echo "- Windows signing secrets present: \`${has_windows_signing}\`"
            echo "- Android release mode: \`${android_release_mode}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  windows-package:
    name: Windows package smoke
    runs-on: windows-latest
    needs: [rust, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows bundles
        run: pnpm build:windows

      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: lightning-p2p-windows-smoke-bundle
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

  release-windows-community:
    name: Release Windows (community unsigned draft)
    if: needs.release-plan.outputs.windows_release_mode == 'community_unsigned'
    runs-on: windows-latest
    needs: [windows-package, release-plan]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        shell: pwsh
        run: |
          $config = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          "APP_VERSION=$($config.version)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RELEASE_TAG=v$($config.version)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build unsigned Windows bundles
        run: pnpm build:windows

      - name: Create stable installer aliases
        shell: pwsh
        run: |
          $releaseRoot = "src-tauri/target/x86_64-pc-windows-msvc/release"
          $bundleRoot = Join-Path $releaseRoot "bundle"

          $nsis = Get-ChildItem -Path (Join-Path $bundleRoot "nsis") -Filter "*_x64-setup.exe" -File |
            Sort-Object Name |
            Select-Object -First 1
          if (-not $nsis) {
            throw "NSIS installer was not found; cannot create stable alias."
          }
          Copy-Item -LiteralPath $nsis.FullName -Destination (Join-Path $bundleRoot "LightningP2PSetup.exe") -Force

          $msi = Get-ChildItem -Path (Join-Path $bundleRoot "msi") -Filter "*_x64_en-US.msi" -File |
            Sort-Object Name |
            Select-Object -First 1
          if (-not $msi) {
            throw "MSI installer was not found; cannot create stable alias."
          }
          Copy-Item -LiteralPath $msi.FullName -Destination (Join-Path $bundleRoot "LightningP2P.msi") -Force

      - name: Setup .NET for Velopack
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Velopack CLI
        shell: pwsh
        run: dotnet tool install -g vpk

      - name: Pack unsigned Velopack installer
        shell: pwsh
        run: |
          $releaseRoot = "src-tauri/target/x86_64-pc-windows-msvc/release"
          $stageDir = Join-Path $releaseRoot "velopack-stage"
          $releasesDir = Join-Path $releaseRoot "velopack-releases"

          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          New-Item -ItemType Directory -Force -Path $releasesDir | Out-Null

          Copy-Item -Path (Join-Path $releaseRoot "lightning-p2p.exe") -Destination $stageDir -Force
          $webView = Join-Path $releaseRoot "WebView2Loader.dll"
          if (Test-Path $webView) {
            Copy-Item -Path $webView -Destination $stageDir -Force
          }
          Copy-Item -Path "scripts/velopack-post-install.ps1" -Destination $stageDir -Force
          Copy-Item -Path "scripts/velopack-post-uninstall.ps1" -Destination $stageDir -Force

          vpk pack `
            --packId "LightningP2P" `
            --packVersion "$env:APP_VERSION" `
            --packDir "$stageDir" `
            --mainExe "lightning-p2p.exe" `
            --packTitle "Lightning P2P" `
            --packAuthors "Lightning P2P" `
            --icon "src-tauri/icons/icon.ico" `
            --outputDir "$releasesDir" `
            --runtime "win-x64" `
            --noPortable

      - name: Stage unsigned release artifacts
        shell: pwsh
        run: |
          $releaseRoot = "src-tauri/target/x86_64-pc-windows-msvc/release"
          $bundleRoot = Join-Path $releaseRoot "bundle"
          $velopackRoot = Join-Path $releaseRoot "velopack-releases"
          $stage = "windows-release-stage"

          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          $nsis = Get-ChildItem -Path (Join-Path $bundleRoot "nsis") -Filter "*_x64-setup.exe" -File |
            Sort-Object Name |
            Select-Object -First 1
          $msi = Get-ChildItem -Path (Join-Path $bundleRoot "msi") -Filter "*_x64_en-US.msi" -File |
            Sort-Object Name |
            Select-Object -First 1
          $velopackSetup = Get-ChildItem -Path $velopackRoot -Filter "*-Setup.exe" -File |
            Sort-Object Name |
            Select-Object -First 1

          if (-not $nsis) { throw "NSIS installer was not found." }
          if (-not $msi) { throw "MSI installer was not found." }
          if (-not $velopackSetup) { throw "Velopack setup artifact was not found." }

          # GitHub release asset names normalize spaces to dots. Stage the
          # exact public names so SHA256SUMS.txt remains directly checkable.
          $nsisAssetName = $nsis.Name.Replace(" ", ".")
          $msiAssetName = $msi.Name.Replace(" ", ".")
          Copy-Item -LiteralPath $nsis.FullName -Destination (Join-Path $stage $nsisAssetName) -Force
          Copy-Item -LiteralPath $msi.FullName -Destination (Join-Path $stage $msiAssetName) -Force
          Copy-Item -LiteralPath (Join-Path $bundleRoot "LightningP2PSetup.exe") -Destination (Join-Path $stage "LightningP2PSetup.exe") -Force
          Copy-Item -LiteralPath (Join-Path $bundleRoot "LightningP2P.msi") -Destination (Join-Path $stage "LightningP2P.msi") -Force
          Copy-Item -LiteralPath $velopackSetup.FullName -Destination (Join-Path $stage "LightningP2P-win-Setup.exe") -Force

          Get-ChildItem -Path $velopackRoot -Filter "*-full.nupkg" -File | ForEach-Object {
            Copy-Item -LiteralPath $_.FullName -Destination (Join-Path $stage $_.Name) -Force
          }
          $releasesFile = Join-Path $velopackRoot "RELEASES"
          if (Test-Path $releasesFile) {
            Copy-Item -LiteralPath $releasesFile -Destination (Join-Path $stage "RELEASES") -Force
          }

      - name: Build and stage CLI binary
        shell: pwsh
        run: |
          cargo build --release --features cli --bin lightning-p2p-cli --target x86_64-pc-windows-msvc --manifest-path src-tauri/Cargo.toml
          $cliExe = "src-tauri/target/x86_64-pc-windows-msvc/release/lightning-p2p-cli.exe"
          if (-not (Test-Path $cliExe)) { throw "CLI binary was not built." }
          Compress-Archive -Path $cliExe -DestinationPath (Join-Path "windows-release-stage" "lightning-p2p-cli-windows-x86_64.zip") -Force

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $stage = "windows-release-stage"
          $checksumPath = Join-Path $stage "SHA256SUMS.txt"
          $files = Get-ChildItem -Path $stage -File |
            Where-Object { $_.Name -ne "SHA256SUMS.txt" } |
            Sort-Object Name

          if (-not $files) {
            throw "No release files found for checksum generation."
          }

          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -Path $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }

          $lines | Set-Content -Path $checksumPath -Encoding utf8
          Write-Host "Checksums written to $checksumPath"

      - name: Verify unsigned release artifacts
        shell: pwsh
        run: |
          $stage = "windows-release-stage"
          $checksums = Join-Path $stage "SHA256SUMS.txt"
          foreach ($name in @("LightningP2P-win-Setup.exe", "LightningP2PSetup.exe", "LightningP2P.msi")) {
            ./scripts/verify-release.ps1 -Installer (Join-Path $stage $name) -Checksums $checksums
          }

      - name: Write community release notes
        shell: pwsh
        run: |
          $body = @(
            "## Lightning P2P v$env:APP_VERSION"
            ""
            "Community unsigned builds for Windows, macOS, and Linux, plus the standalone terminal client."
            ""
            'Windows: this build is not Authenticode code-signed. Windows Defender SmartScreen may show "Windows protected your PC" or "unrecognized app" because Windows cannot verify a publisher identity for unsigned files.'
            ""
            'macOS: the app is not notarized yet. After dragging it to Applications, either right-click -> Open the first time, or run: xattr -cr "/Applications/Lightning P2P.app"'
            ""
            "Verify the source and SHA256 checksum before installing. If you do not trust the source or checksum, do not install."
            ""
            "### Downloads"
            ""
            "| File | Description |"
            "|------|-------------|"
            "| ``LightningP2P-win-Setup.exe`` | Windows - recommended Velopack one-click installer |"
            "| ``LightningP2PSetup.exe`` | Windows - stable alias for the NSIS setup installer |"
            "| ``LightningP2P.msi`` | Windows - stable alias for the MSI installer |"
            "| ``LightningP2P-macos-universal.dmg`` | macOS 10.15+ (Intel + Apple Silicon) |"
            "| ``LightningP2P-linux-x86_64.AppImage`` | Linux - portable, no install needed |"
            "| ``LightningP2P-linux-x86_64.deb`` / ``.rpm`` | Linux - Debian/Ubuntu and Fedora packages |"
            "| ``lightning-p2p-cli-*`` | Terminal client: ``lightning-p2p-cli send <file>`` prints a ticket; pipe it anywhere |"
            "| ``SHA256SUMS*.txt`` | SHA256 checksums per platform |"
            ""
            "### Verify before installing"
            ""
            '```powershell'
            'powershell -ExecutionPolicy Bypass -File .\scripts\verify-release.ps1 -Installer .\LightningP2PSetup.exe -Checksums .\SHA256SUMS.txt'
            '```'
            ""
            "Documentation:"
            ""
            "- Download trust: https://github.com/Kerim-Sabic/lightning-p2p/blob/main/docs/download-trust.md"
            "- Security model: https://github.com/Kerim-Sabic/lightning-p2p/blob/main/SECURITY.md"
            "- Privacy: https://github.com/Kerim-Sabic/lightning-p2p/blob/main/PRIVACY.md"
            ""
            "Full changelog: https://github.com/Kerim-Sabic/lightning-p2p/commits/$env:RELEASE_TAG"
          ) -join [Environment]::NewLine
          $body | Set-Content -Path "RELEASE_NOTES-community.md" -Encoding utf8

      - name: Create draft unsigned GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Lightning P2P v${{ env.APP_VERSION }} (community unsigned)
          body_path: RELEASE_NOTES-community.md
          draft: true
          prerelease: true
          fail_on_unmatched_files: true
          files: windows-release-stage/*

      - name: Upload unsigned release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: lightning-p2p-windows-community-unsigned-bundle
          path: windows-release-stage/*

  release-macos-community:
    name: Release macOS (community unsigned)
    if: needs.release-plan.outputs.windows_release_mode == 'community_unsigned'
    runs-on: macos-latest
    # Serialized on the Windows job so the draft release already exists and
    # multi-job asset uploads cannot race on draft creation.
    needs: [release-windows-community, release-plan]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable (universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        run: |
          version=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$version" >> "$GITHUB_ENV"

      - name: Build universal macOS bundles
        run: pnpm tauri build --ci --target universal-apple-darwin

      - name: Build universal CLI binary
        run: |
          cargo build --release --features cli --bin lightning-p2p-cli --target aarch64-apple-darwin --manifest-path src-tauri/Cargo.toml
          cargo build --release --features cli --bin lightning-p2p-cli --target x86_64-apple-darwin --manifest-path src-tauri/Cargo.toml
          lipo -create -output lightning-p2p-cli \
            src-tauri/target/aarch64-apple-darwin/release/lightning-p2p-cli \
            src-tauri/target/x86_64-apple-darwin/release/lightning-p2p-cli

      - name: Stage macOS release artifacts
        run: |
          set -euo pipefail
          bundle="src-tauri/target/universal-apple-darwin/release/bundle"
          stage="macos-release-stage"
          mkdir -p "$stage"

          dmg=$(find "$bundle/dmg" -name '*.dmg' -type f | sort | head -n 1)
          app=$(find "$bundle/macos" -name '*.app' -maxdepth 1 -type d | sort | head -n 1)
          if [ -z "$dmg" ]; then echo "::error::DMG was not found"; exit 1; fi
          if [ -z "$app" ]; then echo "::error::.app bundle was not found"; exit 1; fi

          # GitHub release asset names normalize spaces to dots; stage the
          # exact public names so SHA256SUMS-macos.txt stays checkable.
          dmg_asset=$(basename "$dmg" | tr ' ' '.')
          cp "$dmg" "$stage/$dmg_asset"
          cp "$dmg" "$stage/LightningP2P-macos-universal.dmg"
          ditto -c -k --keepParent "$app" "$stage/LightningP2P-macos-universal.app.zip"
          tar -czf "$stage/lightning-p2p-cli-macos-universal.tar.gz" lightning-p2p-cli

          (cd "$stage" && shasum -a 256 * > SHA256SUMS-macos.txt)
          cat "$stage/SHA256SUMS-macos.txt"

      - name: Upload macOS artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          fail_on_unmatched_files: true
          files: macos-release-stage/*

      - name: Upload macOS bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: lightning-p2p-macos-community-bundle
          path: macos-release-stage/*

  release-linux-community:
    name: Release Linux (community)
    if: needs.release-plan.outputs.windows_release_mode == 'community_unsigned'
    # ubuntu-22.04 pinned (not -latest): the AppImage inherits the build
    # host's glibc floor, so older runners maximize distro compatibility.
    runs-on: ubuntu-22.04
    needs: [release-windows-community, release-plan]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        run: |
          version=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$version" >> "$GITHUB_ENV"

      - name: Build Linux bundles
        run: pnpm tauri build --ci

      - name: Build CLI binary
        run: cargo build --release --features cli --bin lightning-p2p-cli --manifest-path src-tauri/Cargo.toml

      - name: Stage Linux release artifacts
        run: |
          set -euo pipefail
          bundle="src-tauri/target/release/bundle"
          stage="linux-release-stage"
          mkdir -p "$stage"

          deb=$(find "$bundle/deb" -name '*.deb' -type f | sort | head -n 1)
          rpm=$(find "$bundle/rpm" -name '*.rpm' -type f | sort | head -n 1)
          appimage=$(find "$bundle/appimage" -name '*.AppImage' -type f | sort | head -n 1)
          if [ -z "$deb" ]; then echo "::error::deb was not found"; exit 1; fi
          if [ -z "$rpm" ]; then echo "::error::rpm was not found"; exit 1; fi
          if [ -z "$appimage" ]; then echo "::error::AppImage was not found"; exit 1; fi

          cp "$deb" "$stage/LightningP2P-linux-x86_64.deb"
          cp "$rpm" "$stage/LightningP2P-linux-x86_64.rpm"
          cp "$appimage" "$stage/LightningP2P-linux-x86_64.AppImage"
          tar -czf "$stage/lightning-p2p-cli-linux-x86_64.tar.gz" \
            -C src-tauri/target/release lightning-p2p-cli

          (cd "$stage" && sha256sum * > SHA256SUMS-linux.txt)
          cat "$stage/SHA256SUMS-linux.txt"

      - name: Upload Linux artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          fail_on_unmatched_files: true
          files: linux-release-stage/*

      - name: Upload Linux bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: lightning-p2p-linux-community-bundle
          path: linux-release-stage/*

  release-windows-signed:
    name: Release Windows (production signed)
    if: needs.release-plan.outputs.windows_release_mode == 'production_signed'
    runs-on: windows-latest
    needs: [windows-package, release-plan]
    permissions:
      contents: write
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
      AZURE_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
      AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Trusted Signing CLI
        run: cargo install trusted-signing-cli --locked

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        shell: pwsh
        run: |
          $config = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          "APP_VERSION=$($config.version)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RELEASE_TAG=v$($config.version)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Require updater signing key
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "TAURI_SIGNING_PRIVATE_KEY is required for release builds so updater artifacts can be generated."
          }

          Write-Host "Tauri updater signing key detected. Release config will enable updater artifacts."

      - name: Require Windows code signing secrets
        shell: pwsh
        run: |
          $required = @(
            "AZURE_CLIENT_ID",
            "AZURE_CLIENT_SECRET",
            "AZURE_TENANT_ID",
            "AZURE_TRUSTED_SIGNING_ENDPOINT",
            "AZURE_TRUSTED_SIGNING_ACCOUNT",
            "AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE"
          )

          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "$name is required for Authenticode code signing. Configure Microsoft Artifact Signing / Trusted Signing secrets before publishing this trust release."
            }
          }

          Write-Host "Windows Authenticode signing secrets detected."

      - name: Build and create GitHub release
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: Lightning P2P v${{ env.APP_VERSION }}
          releaseBody: |
            ## Lightning P2P v${{ env.APP_VERSION }}

            Direct peer-to-peer file transfer for Windows. No cloud upload. No accounts. No artificial file-size cap. Direct-first across LAN and WAN with iroh relay fallback when needed.

            ### Downloads

            | File | Description |
            |------|-------------|
            | `LightningP2P-win-Setup.exe` | Recommended Velopack installer (one-click, per-user install, delta-update ready) |
            | `Lightning.P2P_${{ env.APP_VERSION }}_x64-setup.exe` | Classic NSIS installer with Tauri updater metadata |
            | `LightningP2PSetup.exe` | Stable alias for the latest NSIS installer |
            | `Lightning.P2P_${{ env.APP_VERSION }}_x64_en-US.msi` | Windows MSI installer (managed environments) |
            | `LightningP2P.msi` | Stable alias for the latest MSI installer |
            | winget manifest | Planned; publish after the package is accepted in `microsoft/winget-pkgs` |

            Windows binaries are Authenticode code-signed through Microsoft Artifact Signing / Trusted Signing. Tauri updater signatures and SHA256 checksums are published alongside the installers.

            ### What's included

            - Encrypted peer transport through iroh / QUIC TLS 1.3
            - BLAKE3 verified streaming with iroh-blobs
            - Six speed modes with BBR congestion control on Fast and above, including the new Warp mode
            - Experimental swarm receive: parallel per-file fetches for folder transfers (opt-in, auto-fallback)
            - Ticket pre-warming: the connection is already hot when you press Receive
            - WAN reachability with direct and relay-assisted connectivity
            - Live progress tracking with speed, ETA, route, and first-byte telemetry
            - Receive handoff links and QR sharing
            - Transfer history with one-click re-share
            - HTTPS receive handoff links: `https://lightning-p2p.netlify.app/receive#t=...`
            - Custom speed-lab branded installers (NSIS, MSI, Velopack)
            - Code-signed Windows binaries and signed updater metadata

            ### Installation

            1. Download the recommended `LightningP2P-win-Setup.exe` installer above
            2. Run the installer
            3. Launch Lightning P2P from the Start Menu

            ---

            Full changelog: https://github.com/Kerim-Sabic/lightning-p2p/commits/${{ env.RELEASE_TAG }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --ci --target x86_64-pc-windows-msvc --config src-tauri/tauri.release.conf.json

      - name: Create stable installer aliases
        shell: pwsh
        run: |
          $releaseRoot = "src-tauri/target/x86_64-pc-windows-msvc/release"
          $bundleRoot = Join-Path $releaseRoot "bundle"
          $nsis = Get-ChildItem -Path (Join-Path $bundleRoot "nsis") -Filter "*_x64-setup.exe" -File |
            Sort-Object Name |
            Select-Object -First 1
          if (-not $nsis) {
            throw "NSIS installer was not found; cannot create stable alias."
          }
          Copy-Item -LiteralPath $nsis.FullName -Destination (Join-Path $bundleRoot "LightningP2PSetup.exe") -Force
          $nsisSig = "$($nsis.FullName).sig"
          if (Test-Path $nsisSig) {
            Copy-Item -LiteralPath $nsisSig -Destination (Join-Path $bundleRoot "LightningP2PSetup.exe.sig") -Force
          }

          $msi = Get-ChildItem -Path (Join-Path $bundleRoot "msi") -Filter "*_x64_en-US.msi" -File |
            Sort-Object Name |
            Select-Object -First 1
          if (-not $msi) {
            throw "MSI installer was not found; cannot create stable alias."
          }
          Copy-Item -LiteralPath $msi.FullName -Destination (Join-Path $bundleRoot "LightningP2P.msi") -Force
          $msiSig = "$($msi.FullName).sig"
          if (Test-Path $msiSig) {
            Copy-Item -LiteralPath $msiSig -Destination (Join-Path $bundleRoot "LightningP2P.msi.sig") -Force
          }

      - name: Setup .NET for Velopack
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Velopack CLI
        shell: pwsh
        run: dotnet tool install -g vpk

      - name: Pack Velopack installer
        shell: pwsh
        run: |
          $releaseRoot = "src-tauri/target/x86_64-pc-windows-msvc/release"
          $stageDir = Join-Path $releaseRoot "velopack-stage"
          $releasesDir = Join-Path $releaseRoot "velopack-releases"

          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          New-Item -ItemType Directory -Force -Path $releasesDir | Out-Null

          Copy-Item -Path (Join-Path $releaseRoot "lightning-p2p.exe") -Destination $stageDir -Force
          $webView = Join-Path $releaseRoot "WebView2Loader.dll"
          if (Test-Path $webView) {
            Copy-Item -Path $webView -Destination $stageDir -Force
          }
          Copy-Item -Path "scripts/velopack-post-install.ps1" -Destination $stageDir -Force
          Copy-Item -Path "scripts/velopack-post-uninstall.ps1" -Destination $stageDir -Force

          vpk pack `
            --packId "LightningP2P" `
            --packVersion "$env:APP_VERSION" `
            --packDir "$stageDir" `
            --mainExe "lightning-p2p.exe" `
            --packTitle "Lightning P2P" `
            --packAuthors "Lightning P2P" `
            --icon "src-tauri/icons/icon.ico" `
            --outputDir "$releasesDir" `
            --runtime "win-x64" `
            --noPortable

      - name: Sign Velopack setup artifact
        shell: pwsh
        run: |
          $releaseRoot = "src-tauri/target/x86_64-pc-windows-msvc/release"
          $velopackRoot = Join-Path $releaseRoot "velopack-releases"
          $setups = Get-ChildItem -Path $velopackRoot -Filter "*-Setup.exe" -File
          if (-not $setups) {
            throw "Velopack setup artifact was not found; cannot code-sign it."
          }

          foreach ($setup in $setups) {
            ./src-tauri/windows/sign-windows.ps1 -Path $setup.FullName
          }

      - name: Verify Authenticode signatures
        shell: pwsh
        run: |
          $releaseRoot = "src-tauri/target/x86_64-pc-windows-msvc/release"
          $bundleRoot = Join-Path $releaseRoot "bundle"
          $velopackRoot = Join-Path $releaseRoot "velopack-releases"
          $signatureTargets = @()
          $signatureTargets += Get-ChildItem -Path $releaseRoot -Filter "lightning-p2p.exe" -File
          $signatureTargets += Get-ChildItem -Path (Join-Path $bundleRoot "nsis") -Filter "*.exe" -File
          $signatureTargets += Get-ChildItem -Path (Join-Path $bundleRoot "msi") -Filter "*.msi" -File
          $signatureTargets += Get-ChildItem -Path $bundleRoot -Filter "LightningP2PSetup.exe" -File
          $signatureTargets += Get-ChildItem -Path $bundleRoot -Filter "LightningP2P.msi" -File
          $signatureTargets += Get-ChildItem -Path $velopackRoot -Filter "*-Setup.exe" -File

          if (-not $signatureTargets) {
            throw "No Authenticode signature targets were found."
          }

          foreach ($target in $signatureTargets) {
            $signature = Get-AuthenticodeSignature -FilePath $target.FullName
            if ($signature.Status -ne "Valid") {
              throw "Invalid Authenticode signature for $($target.Name): $($signature.Status) $($signature.StatusMessage)"
            }
            Write-Host "Valid Authenticode signature: $($target.Name)"
          }

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $releaseRoot = "src-tauri/target/x86_64-pc-windows-msvc/release"
          $bundleRoot = Join-Path $releaseRoot "bundle"
          $velopackRoot = Join-Path $releaseRoot "velopack-releases"
          $checksumPath = Join-Path $bundleRoot "SHA256SUMS.txt"
          $latestJsonPath = Join-Path $bundleRoot "latest.json"
          $latestJsonUrl = "https://github.com/${{ github.repository }}/releases/download/$env:RELEASE_TAG/latest.json"

          for ($attempt = 1; $attempt -le 5; $attempt++) {
            try {
              Invoke-WebRequest -Uri $latestJsonUrl -OutFile $latestJsonPath
              break
            } catch {
              if ($attempt -eq 5) {
                throw
              }

              Start-Sleep -Seconds 5
            }
          }

          $files = @()
          foreach ($root in @($bundleRoot, $velopackRoot)) {
            if (Test-Path $root) {
              $files += Get-ChildItem -Path $root -Recurse -File |
                Where-Object {
                  $_.Extension -in ".exe", ".msi", ".sig", ".zip", ".nupkg" -or
                  $_.Name -like "latest*.json" -or
                  $_.Name -eq "RELEASES"
                }
            }
          }

          $files = $files | Sort-Object Name
          if (-not $files) {
            throw "No release files found for checksum generation."
          }

          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -Path $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            # GitHub normalizes spaces in uploaded release asset names to dots.
            $assetName = $file.Name.Replace(" ", ".")
            "$hash  $assetName"
          }

          $lines | Set-Content -Path $checksumPath -Encoding utf8
          Write-Host "Checksums written to $checksumPath"

      - name: Upload Velopack installer and checksums to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/LightningP2PSetup.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/LightningP2PSetup.exe.sig
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/LightningP2P.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/LightningP2P.msi.sig
            src-tauri/target/x86_64-pc-windows-msvc/release/velopack-releases/*-Setup.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/velopack-releases/*-full.nupkg
            src-tauri/target/x86_64-pc-windows-msvc/release/velopack-releases/RELEASES
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/SHA256SUMS.txt

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: lightning-p2p-windows-release-bundle
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.zip
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.zip
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.sig
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/LightningP2PSetup.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/LightningP2PSetup.exe.sig
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/LightningP2P.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/LightningP2P.msi.sig
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/SHA256SUMS.txt
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.zip
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.sig
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/latest*.json
            src-tauri/target/x86_64-pc-windows-msvc/release/velopack-releases/*-Setup.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/velopack-releases/*-full.nupkg
            src-tauri/target/x86_64-pc-windows-msvc/release/velopack-releases/RELEASES

  android-package:
    name: Android APK smoke
    runs-on: ubuntu-latest
    needs: [rust, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-36 build-tools;36.0.0 ndk;26.3.11579264"

      - name: Resolve NDK_HOME
        # setup-android stopped exporting ANDROID_NDK_HOME on newer runner
        # images; the NDK is installed under the SDK root, so resolve it
        # ourselves and export both spellings for the Tauri CLI.
        run: |
          ndk_root="${ANDROID_SDK_ROOT:-$ANDROID_HOME}/ndk"
          version=$(ls -1 "$ndk_root" | sort -V | tail -n 1)
          if [ -z "$version" ]; then
            echo "::error::No NDK found under $ndk_root"
            exit 1
          fi
          {
            echo "NDK_HOME=$ndk_root/$version"
            echo "ANDROID_NDK_HOME=$ndk_root/$version"
          } >> "$GITHUB_ENV"
          echo "Resolved NDK at $ndk_root/$version"

      - name: Free Android runner disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Rust Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: ./src-tauri -> target
          key: android
          cache-targets: false

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build Android release APK smoke
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: pnpm android:build:apk

      - name: Build Android release AAB smoke
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: pnpm android:build:aab

      - name: Sign release APK for launch smoke
        run: |
          set -euo pipefail
          out=src-tauri/gen/android/app/build/outputs
          stage="${GITHUB_WORKSPACE}/android-release-smoke-stage"
          mkdir -p "$stage"

          apk=$(find "$out/apk" -type f \( -path '*/universal/release/*.apk' -o -path '*/release/*.apk' \) | sort | head -n 1)
          if [ -z "$apk" ]; then
            echo "::error::No release APK found under $out/apk"
            find "$out/apk" -maxdepth 5 -type f -print || true
            exit 1
          fi

          bt_root="${ANDROID_SDK_ROOT:-$ANDROID_HOME}/build-tools"
          latest=$(ls -1 "$bt_root" | sort -V | tail -n 1)
          if [ -z "$latest" ]; then
            echo "::error::No Android build-tools found under $bt_root"
            exit 1
          fi
          build_tools="$bt_root/$latest"

          keystore="$stage/ci-release-smoke.jks"
          signed_apk="$stage/LightningP2P-release-smoke.apk"
          storepass="lightning-ci-release-smoke"
          keytool -genkeypair \
            -storetype PKCS12 \
            -keystore "$keystore" \
            -storepass "$storepass" \
            -keypass "$storepass" \
            -alias ci-release-smoke \
            -keyalg RSA \
            -keysize 2048 \
            -validity 7 \
            -dname "CN=Lightning P2P CI Release Smoke,O=Lightning P2P,C=US"

          "$build_tools/apksigner" sign \
            --ks "$keystore" \
            --ks-key-alias ci-release-smoke \
            --ks-pass "pass:$storepass" \
            --key-pass "pass:$storepass" \
            --out "$signed_apk" \
            "$apk"
          "$build_tools/apksigner" verify --verbose "$signed_apk"
          rm -f "$keystore"
          ls -lh "$stage"

      - name: Upload signed release smoke APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lightning-p2p-android-release-smoke-apk
          path: android-release-smoke-stage/*.apk

      - name: Upload Android package smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lightning-p2p-android-package-smoke
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab

  android-emulator-smoke:
    name: Android emulator launch smoke
    # JNI/bootstrap failures can survive a successful package build, so launch
    # the release-shaped APK on PRs as well as main and tagged releases.
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    needs: [android-package]
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download signed release smoke APK artifact
        uses: actions/download-artifact@v4
        with:
          name: lightning-p2p-android-release-smoke-apk
          path: android-release-smoke-artifact

      - name: Locate APK
        id: locate_apk
        run: |
          apk=$(find android-release-smoke-artifact -name '*.apk' -type f | head -n 1)
          if [ -z "$apk" ]; then
            echo "::error::No APK found in downloaded artifact"
            exit 1
          fi
          echo "apk=$apk" >> "$GITHUB_OUTPUT"
          echo "Located APK at $apk"

      - name: Run launcher smoke test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-metrics
          disable-animations: true
          script: |
            bash "${GITHUB_WORKSPACE}/scripts/android-launch-smoke.sh" "${GITHUB_WORKSPACE}/${{ steps.locate_apk.outputs.apk }}" "release-smoke"

      - name: Upload release APK launch smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lightning-p2p-android-release-smoke-logs
          path: |
            logcat-release-smoke.txt
            activities-release-smoke.txt
            process-release-smoke.txt

  release-android:
    name: Release Android
    if: needs.release-plan.outputs.android_release_mode == 'signed'
    runs-on: ubuntu-latest
    needs: [android-package, release-plan]
    permissions:
      contents: write
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Require Android signing secrets
        run: |
          missing=""
          for var in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!var}" ]; then
              missing="$missing $var"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing Android signing secrets:$missing"
            echo "Add them in repo Settings -> Secrets and variables -> Actions before tagging a release."
            echo "See docs/android-release-runbook.md for the keystore + base64 setup."
            exit 1
          fi
          echo "Android signing secrets detected."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-36 build-tools;36.0.0 ndk;26.3.11579264"

      - name: Resolve NDK_HOME
        # setup-android stopped exporting ANDROID_NDK_HOME on newer runner
        # images; the NDK is installed under the SDK root, so resolve it
        # ourselves and export both spellings for the Tauri CLI.
        run: |
          ndk_root="${ANDROID_SDK_ROOT:-$ANDROID_HOME}/ndk"
          version=$(ls -1 "$ndk_root" | sort -V | tail -n 1)
          if [ -z "$version" ]; then
            echo "::error::No NDK found under $ndk_root"
            exit 1
          fi
          {
            echo "NDK_HOME=$ndk_root/$version"
            echo "ANDROID_NDK_HOME=$ndk_root/$version"
          } >> "$GITHUB_ENV"
          echo "Resolved NDK at $ndk_root/$version"

      - name: Free Android runner disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Rust Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: ./src-tauri -> target
          key: android-release
          cache-targets: false

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Decode signing keystore
        run: |
          keystore_path="${GITHUB_WORKSPACE}/lightning-p2p-release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$keystore_path"
          echo "ANDROID_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"

      - name: Resolve release version
        run: |
          version=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$version" >> "$GITHUB_ENV"

      - name: Build signed Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: pnpm android:build:apk

      - name: Build signed Android AAB
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: pnpm android:build:aab

      - name: Stage and name release artifacts
        run: |
          out=src-tauri/gen/android/app/build/outputs
          stage="${GITHUB_WORKSPACE}/android-release-stage"
          mkdir -p "$stage"

          apk=$(find "$out/apk" -type f \( -path '*/universal/release/*.apk' -o -path '*/release/*.apk' \) | sort | head -n 1)
          aab=$(find "$out/bundle" -type f \( -path '*/universalRelease/*.aab' -o -path '*/release/*.aab' \) | sort | head -n 1)

          if [ -z "$apk" ]; then
            echo "::error::No release APK found under $out/apk"
            find "$out/apk" -maxdepth 5 -type f -print || true
            exit 1
          fi
          if [ -z "$aab" ]; then
            echo "::error::No release AAB found under $out/bundle"
            find "$out/bundle" -maxdepth 5 -type f -print || true
            exit 1
          fi

          cp "$apk" "$stage/LightningP2P-${APP_VERSION}-android.apk"
          cp "$aab" "$stage/LightningP2P-${APP_VERSION}-android.aab"
          # Stable alias so README links can always point at the latest APK.
          cp "$apk" "$stage/LightningP2P-android-latest.apk"

          echo "Android release artifacts staged at $stage"
          ls -lh "$stage"

      - name: Resolve Android build-tools binaries
        id: build_tools
        run: |
          # ANDROID_HOME is set by android-actions/setup-android; pick the
          # newest installed build-tools directory so apksigner and aapt2 are
          # resolved even when the SDK installs alongside an older version.
          bt_root="${ANDROID_SDK_ROOT:-$ANDROID_HOME}/build-tools"
          if [ ! -d "$bt_root" ]; then
            echo "::error::Missing build-tools directory at $bt_root"
            exit 1
          fi
          latest=$(ls -1 "$bt_root" | sort -V | tail -n 1)
          if [ -z "$latest" ]; then
            echo "::error::No build-tools installed under $bt_root"
            exit 1
          fi
          echo "bin=$bt_root/$latest" >> "$GITHUB_OUTPUT"
          echo "Resolved build-tools at $bt_root/$latest"

      - name: Verify APK signature (v2/v3 required)
        env:
          BUILD_TOOLS: ${{ steps.build_tools.outputs.bin }}
        run: |
          apk="${GITHUB_WORKSPACE}/android-release-stage/LightningP2P-${APP_VERSION}-android.apk"
          if [ ! -f "$apk" ]; then
            echo "::error::Staged APK missing at $apk"
            exit 1
          fi
          echo "Running apksigner verify on $apk"
          "$BUILD_TOOLS/apksigner" verify --verbose --print-certs "$apk" | tee apksigner-output.txt

          # Refuse v1-only signing: Play Protect requires at least v2.
          if ! grep -Eq '^Verified using v2 scheme \(APK Signature Scheme v2\): true' apksigner-output.txt; then
            echo "::error::APK is not signed with v2 scheme. Play Protect bar is v2 minimum."
            exit 1
          fi
          if ! grep -Eq '^Verified using v3 scheme \(APK Signature Scheme v3\): true' apksigner-output.txt; then
            # v3 is strongly preferred but not strictly required for Android 9+
            # devices that support it; fall back to a warning rather than fail.
            echo "::warning::APK is not signed with v3 scheme. Consider adding v3 for key rotation support."
          fi

          # Extract the SHA-256 cert digest into a stable file so the next step
          # can publish it next to the SHA-256 file hashes.
          cert_sha256=$(
            awk '
              /^Signer #[0-9]+ certificate SHA-256 digest:/ { print $NF; exit }
              /^V[0-9]+(\.[0-9]+)? Signer: certificate SHA-256 digest:/ { print $NF; exit }
            ' apksigner-output.txt
          )
          if ! echo "$cert_sha256" | grep -Eq '^[a-fA-F0-9]{64}$'; then
            echo "::error::Could not parse signer cert SHA-256 from apksigner output."
            exit 1
          fi
          echo "APK_CERT_SHA256=$cert_sha256" >> "$GITHUB_ENV"

          {
            echo "### Android signing verification"
            echo ""
            echo "- v2 scheme: \`verified\`"
            echo "- Signer #1 SHA-256 cert digest: \`$cert_sha256\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Inspect APK metadata
        env:
          BUILD_TOOLS: ${{ steps.build_tools.outputs.bin }}
        run: |
          apk="${GITHUB_WORKSPACE}/android-release-stage/LightningP2P-${APP_VERSION}-android.apk"
          "$BUILD_TOOLS/aapt2" dump badging "$apk" > aapt2-badging.txt || true
          if [ -s aapt2-badging.txt ]; then
            pkg=$(grep -E '^package:' aapt2-badging.txt | head -n 1 || true)
            sdk=$(grep -E '^sdkVersion:' aapt2-badging.txt | head -n 1 || true)
            target=$(grep -E '^targetSdkVersion:' aapt2-badging.txt | head -n 1 || true)
            {
              echo ""
              echo "### Android APK metadata"
              echo ""
              echo "- \`$pkg\`"
              echo "- \`$sdk\`"
              echo "- \`$target\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Enable KVM for release APK launch smoke
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Launch staged release APK on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-metrics
          disable-animations: true
          script: |
            bash "${GITHUB_WORKSPACE}/scripts/android-launch-smoke.sh" "${GITHUB_WORKSPACE}/android-release-stage/LightningP2P-${APP_VERSION}-android.apk" "release-smoke"

      - name: Upload release APK launch smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lightning-p2p-android-release-launch-smoke-logs
          path: |
            logcat-release-smoke.txt
            activities-release-smoke.txt
            process-release-smoke.txt

      - name: Write SHA256SUMS with signer fingerprint
        run: |
          stage="${GITHUB_WORKSPACE}/android-release-stage"
          (
            cd "$stage"
            {
              echo "# Lightning P2P Android release artifacts"
              echo "# Generated by GitHub Actions on $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "# Signer #1 certificate SHA-256: ${APK_CERT_SHA256}"
              echo "# Verify cert with: apksigner verify --print-certs <apk>"
              echo ""
              sha256sum *.apk *.aab
            } > SHA256SUMS-android.txt
          )
          echo "SHA256SUMS-android.txt contents:"
          cat "$stage/SHA256SUMS-android.txt"

      - name: Clean up keystore
        if: always()
        run: rm -f "$ANDROID_KEYSTORE_PATH"

      - name: Upload Android artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            android-release-stage/LightningP2P-${{ env.APP_VERSION }}-android.apk
            android-release-stage/LightningP2P-${{ env.APP_VERSION }}-android.aab
            android-release-stage/LightningP2P-android-latest.apk
            android-release-stage/SHA256SUMS-android.txt

      - name: Upload Android release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: lightning-p2p-android-release-bundle
          path: android-release-stage/*
