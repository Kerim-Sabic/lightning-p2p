name: Windows download warning
description: Report SmartScreen, browser, or antivirus friction for a Windows release.
title: "[Windows warning] "
labels: ["windows", "download-trust"]
body:
  - type: markdown
    attributes:
      value: |
        Windows may warn on unsigned or new downloads. This template helps separate expected SmartScreen reputation friction from real integrity problems.

        Do not include private tickets, personal files, or sensitive screenshots.
  - type: input
    id: windows-version
    attributes:
      label: Windows version
      placeholder: "Windows 11 23H2"
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser or download client
      placeholder: "Microsoft Edge 125"
    validations:
      required: true
  - type: input
    id: installer-filename
    attributes:
      label: Installer filename
      placeholder: "LightningP2PSetup.exe"
    validations:
      required: true
  - type: input
    id: download-url
    attributes:
      label: Download source URL
      placeholder: "https://github.com/Kerim-Sabic/lightning-p2p/releases/..."
    validations:
      required: true
  - type: input
    id: sha256
    attributes:
      label: SHA256 hash
      description: Run `Get-FileHash .\LightningP2PSetup.exe -Algorithm SHA256`.
    validations:
      required: true
  - type: dropdown
    id: checksum-match
    attributes:
      label: Does the hash match SHA256SUMS.txt?
      options:
        - Yes
        - No
        - I could not find SHA256SUMS.txt
        - I have not checked yet
    validations:
      required: true
  - type: dropdown
    id: authenticode
    attributes:
      label: Authenticode status
      description: Run `Get-AuthenticodeSignature .\LightningP2PSetup.exe`.
      options:
        - Signed + Valid
        - Signed but invalid
        - Unsigned
        - I have not checked yet
    validations:
      required: true
  - type: textarea
    id: warning
    attributes:
      label: Warning text or screenshot
      description: Paste exact warning text, or attach a screenshot if you are comfortable.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
    validations:
      required: false
