<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240" width="960" height="240" role="img" aria-label="Lightning P2P: sender app streams BLAKE3-verified bytes directly to a receiver, even a browser tab">
  <style>
    .mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; }
    .k { fill: #5b6663; font-size: 9px; letter-spacing: 2.4px; font-weight: 700; }
    .t { fill: #e8efec; font-size: 13px; font-weight: 700; }
    .s { fill: #8fa39b; font-size: 10.5px; }
    .g { fill: #7ddf9c; }
    .amber { fill: #f0c76b; }

    .pkt { animation: flow 2.6s cubic-bezier(.45,.05,.55,.95) infinite; }
    .pkt2 { animation-delay: .65s; }
    .pkt3 { animation-delay: 1.3s; }
    .pkt4 { animation-delay: 1.95s; }
    @keyframes flow {
      0%   { transform: translateX(0);     opacity: 0; }
      8%   { opacity: 1; }
      88%  { opacity: 1; }
      100% { transform: translateX(378px); opacity: 0; }
    }

    .relaydash { stroke-dasharray: 4 7; animation: march 1.4s linear infinite; }
    @keyframes march { to { stroke-dashoffset: -22; } }

    .pulse { animation: pulse 2.6s ease-in-out infinite; transform-origin: 745px 74px; }
    @keyframes pulse {
      0%, 100% { opacity: .55; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.08); }
    }

    .breathe { animation: breathe 3.4s ease-in-out infinite; }
    .breathe2 { animation-delay: 1.7s; }
    @keyframes breathe {
      0%, 100% { opacity: .35; }
      50%      { opacity: .9; }
    }

    .caret { animation: caret 1.1s steps(1) infinite; }
    @keyframes caret { 0%, 60% { opacity: 1; } 61%, 100% { opacity: 0; } }

    @media (prefers-reduced-motion: reduce) {
      .pkt, .relaydash, .pulse, .breathe, .caret { animation: none; }
      .pkt { opacity: .85; transform: translateX(190px); }
    }
  </style>

  <!-- Card -->
  <rect x="1.5" y="1.5" width="957" height="237" rx="18" fill="#0b0f0d" stroke="#243029" stroke-width="1.5"/>
  <rect x="1.5" y="1.5" width="957" height="237" rx="18" fill="url(#sheen)" opacity=".5"/>
  <defs>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7ddf9c" stop-opacity=".045"/>
      <stop offset=".35" stop-color="#7ddf9c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7ddf9c" stop-opacity=".08"/>
      <stop offset=".5" stop-color="#7ddf9c" stop-opacity=".55"/>
      <stop offset="1" stop-color="#7ddf9c" stop-opacity=".08"/>
    </linearGradient>
  </defs>

  <!-- ── Sender node ── -->
  <g>
    <rect x="56" y="52" width="212" height="118" rx="14" fill="#101613" stroke="#2a3a31" stroke-width="1.2"/>
    <text x="76" y="80" class="mono k">SENDER</text>
    <circle cx="248" cy="76" r="3" class="g breathe"/>
    <!-- bolt mark -->
    <path d="M104 96 L91 121 L101 121 L95 142 L114 114 L103 114 L110 96 Z" fill="#7ddf9c"/>
    <text x="128" y="112" class="mono t">native app · CLI</text>
    <text x="128" y="130" class="mono s">files stay on disk</text>
    <text x="128" y="146" class="mono s">ticket = NodeId + hash</text>
    <text x="76" y="146" class="mono g caret" font-size="11">▌</text>
  </g>

  <!-- ── Transport channel ── -->
  <g>
    <!-- direct path -->
    <line x1="284" y1="98" x2="676" y2="98" stroke="url(#beam)" stroke-width="2"/>
    <text x="480" y="88" text-anchor="middle" class="mono k">DIRECT · IROH QUIC · TLS 1.3</text>
    <!-- packets on the direct path -->
    <g>
      <circle cx="290" cy="98" r="3.4" class="g pkt"/>
      <circle cx="290" cy="98" r="3.4" class="g pkt pkt2"/>
      <circle cx="290" cy="98" r="3.4" class="g pkt pkt3"/>
      <circle cx="290" cy="98" r="3.4" fill="#f0c76b" class="pkt pkt4"/>
    </g>
    <!-- relay fallback path -->
    <path d="M284 132 C 380 168, 580 168, 676 132" fill="none" stroke="#f0c76b" stroke-opacity=".5" stroke-width="1.4" class="relaydash"/>
    <text x="480" y="172" text-anchor="middle" class="mono k">RELAY FALLBACK · ENCRYPTED FRAMES ONLY</text>
  </g>

  <!-- ── Receiver node: browser ── -->
  <g>
    <rect x="692" y="52" width="212" height="118" rx="14" fill="#101613" stroke="#2a3a31" stroke-width="1.2"/>
    <!-- browser top bar -->
    <rect x="692" y="52" width="212" height="26" rx="14" fill="#161e1a"/>
    <rect x="692" y="66" width="212" height="12" fill="#161e1a"/>
    <circle cx="710" cy="65" r="3" fill="#31413a"/>
    <circle cx="722" cy="65" r="3" fill="#31413a"/>
    <circle cx="734" cy="65" r="3" fill="#31413a"/>
    <g class="pulse">
      <circle cx="745" cy="74" r="0" fill="none"/>
    </g>
    <text x="752" y="69" class="mono k" font-size="8">/receive#t=fd2:…</text>
    <text x="712" y="103" class="mono k">RECEIVER</text>
    <circle cx="884" cy="99" r="3" class="g breathe breathe2"/>
    <text x="712" y="124" class="mono t">any browser tab</text>
    <text x="712" y="141" class="mono s">same Rust engine · WASM</text>
    <!-- verified badge -->
    <g class="pulse">
      <rect x="712" y="150" width="120" height="16" rx="8" fill="#7ddf9c" fill-opacity=".14" stroke="#7ddf9c" stroke-opacity=".45" stroke-width="1"/>
      <text x="722" y="161.5" class="mono g" font-size="9" font-weight="700">✓ BLAKE3 VERIFIED</text>
    </g>
  </g>

  <!-- ── Caption ── -->
  <text x="480" y="212" text-anchor="middle" class="mono s" font-size="11">
    drop → ticket → verified bytes&#160;&#160;·&#160;&#160;no cloud&#160;&#160;·&#160;&#160;no account&#160;&#160;·&#160;&#160;no install on the receiving end
  </text>
</svg>
